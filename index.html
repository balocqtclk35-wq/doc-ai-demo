<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document Classification</title>
</head>

<body>

<h2>Document Classification Demo</h2>

<input type="file" id="imageUpload">
<br><br>

<img id="preview" width="300">
<h3 id="result">Loading model...</h3>

<!-- ✅ SCRIPT ĐÚNG CÚ PHÁP -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.20.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.4"></script>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/MEVmvU0Ci/";

let model;

// Load model
async function init() {
  try {
    model = await tmImage.load(
      URL + "model.json",
      URL + "metadata.json"
    );
    document.getElementById("result").innerText = "✅ Model loaded";
  } catch (e) {
    console.error(e);
    document.getElementById("result").innerText = "❌ Load model failed";
  }
}

init();

// Upload image
document.getElementById("imageUpload").addEventListener("change", async function(e) {

  if (!model) {
    alert("Model chưa load xong!");
    return;
  }

  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async function(evt) {

    const img = document.getElementById("preview");
    img.src = evt.target.result;

    await new Promise(r => img.onload = r);

    const prediction = await model.predict(img);

    prediction.sort((a,b)=>b.probability-a.probability);

    const top = prediction[0];

    document.getElementById("result").innerHTML =
      top.className + " (" + (top.probability*100).toFixed(1) + "%)";
  };

  reader.readAsDataURL(file);
});
</script>

</body>
</html>
