<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document Classification</title>
</head>

<body>

<h2>Document Classification Demo</h2>

<input type="file" id="imageUpload">
<br><br>

<img id="preview" width="300">
<h3 id="result">Loading model...</h3>

<!-- ✅ FEEDBACK UI -->
<div id="feedback" style="display:none;">
  <button onclick="confirmResult(true)">✅ Đúng</button>
  <button onclick="confirmResult(false)">❌ Sai</button>

  <br><br>

  <select id="correctLabel" style="display:none;">
    <option>GPLX</option>
    <option>BHYT</option>
    <option>VEHICLE</option>
    <option>OTHER</option>
  </select>
</div>

<!-- ✅ SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.20.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.4/dist/teachablemachine-image.min.js"></script>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/MEVmvU0Ci/";

let model;
let predictedClass = "";

// Load model
async function init() {
  try {
    model = await tmImage.load(
      URL + "model.json",
      URL + "metadata.json"
    );
    document.getElementById("result").innerText = "✅ Model loaded - chọn ảnh";
  } catch (err) {
    console.error(err);
    document.getElementById("result").innerText = "❌ Load model failed";
  }
}

init();

// Upload ảnh
document.getElementById("imageUpload").addEventListener("change", async function(e) {

  if (!model) {
    alert("Model chưa load xong");
    return;
  }

  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async function(evt) {

    const img = document.getElementById("preview");
    img.src = evt.target.result;

    await new Promise(r => img.onload = r);

    const predictions = await model.predict(img);
    predictions.sort((a,b)=>b.probability-a.probability);

    const top = predictions[0];

    // ✅ lưu kết quả AI
    predictedClass = top.className;

    document.getElementById("result").innerHTML =
      "<b>" + top.className + "</b><br>" +
      "Confidence: " + (top.probability * 100).toFixed(2) + "%";

    // ✅ hiển thị feedback
    document.getElementById("feedback").style.display = "block";
  };

  reader.readAsDataURL(file);
});

// ✅ xử lý feedback

  let finalLabel;

  if (isCorrect) {
    finalLabel = predictedClass;
  } else {
    document.getElementById("correctLabel").style.display = "block";
